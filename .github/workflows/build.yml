name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: windows-node_modules-${{ hashFiles('bun.lockb') }}
          restore-keys: windows-node_modules-

      - name: Cache Electron
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\electron\Cache
          key: windows-electron-${{ hashFiles('package.json') }}
          restore-keys: windows-electron-

      - name: Cache electron-builder
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\electron-builder\Cache
          key: windows-electron-builder-${{ hashFiles('package.json') }}
          restore-keys: windows-electron-builder-

      - name: Install dependencies
        run: bun install --frozen-lockfile
        timeout-minutes: 10

      - name: Generate DB migrations
        run: bun run db:generate

      - name: Rebuild native modules
        run: bun run prepare:native

      - name: Build & Publish Windows
        run: bun run build && electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: linux-node_modules-${{ hashFiles('bun.lockb') }}
          restore-keys: linux-node_modules-

      - name: Cache Electron
        uses: actions/cache@v4
        with:
          path: ~/.cache/electron
          key: linux-electron-${{ hashFiles('package.json') }}
          restore-keys: linux-electron-

      - name: Cache electron-builder
        uses: actions/cache@v4
        with:
          path: ~/.cache/electron-builder
          key: linux-electron-builder-${{ hashFiles('package.json') }}
          restore-keys: linux-electron-builder-

      - name: Install system deps
        run: sudo apt-get install -y rpm fakeroot

      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          ELECTRON_GET_USE_PROXY: false
        timeout-minutes: 10

      - name: Generate DB migrations
        run: bun run db:generate

      - name: Rebuild native modules
        run: bun run prepare:native

      - name: Build & Publish Linux
        run: bun run build && electron-builder --linux deb AppImage --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: macos-node_modules-${{ hashFiles('bun.lockb') }}
          restore-keys: macos-node_modules-

      - name: Cache Electron
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/electron
          key: macos-electron-${{ hashFiles('package.json') }}
          restore-keys: macos-electron-

      - name: Cache electron-builder
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/electron-builder
          key: macos-electron-builder-${{ hashFiles('package.json') }}
          restore-keys: macos-electron-builder-

      - name: Install dependencies
        run: bun install --frozen-lockfile
        timeout-minutes: 10

      - name: Generate DB migrations
        run: bun run db:generate

      - name: Rebuild native modules
        run: bun run prepare:native

      - name: Build & Publish macOS
        run: bun run build && electron-builder --mac --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

  changelog:
    needs: [build-windows, build-linux, build-mac]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install git-cliff
        uses: kenji-miyake/setup-git-cliff@v2

      - name: Generate release notes
        run: git-cliff --config cliff.toml --latest --strip header --tag "${{ github.ref_name }}" -o RELEASE_NOTES.md

      - name: Update release with changelog
        run: |
          gh release edit "${{ github.ref_name }}" \
            --notes-file RELEASE_NOTES.md \
            --prerelease=${{ contains(github.ref, '-beta') || contains(github.ref, '-alpha') || contains(github.ref, '-rc') }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update CHANGELOG.md
        run: git-cliff --config cliff.toml --tag "${{ github.ref_name }}" -o CHANGELOG.md

      - name: Commit CHANGELOG.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "chore(release): update CHANGELOG.md for ${{ github.ref_name }}" || echo "No changes to commit"
          git push origin HEAD || echo "Nothing to push"
