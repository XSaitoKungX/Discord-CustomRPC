name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install dependencies
        run: bun install --frozen-lockfile
        timeout-minutes: 10
      - name: Generate DB migrations
        run: bun run db:generate
      - name: Rebuild native modules
        run: bun run prepare:native
      - name: Package Windows
        run: bun run build:win
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            dist/*.exe
            dist/latest.yml
          if-no-files-found: warn

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install system deps
        run: sudo apt-get install -y rpm fakeroot
      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          ELECTRON_GET_USE_PROXY: false
        timeout-minutes: 10
      - name: Generate DB migrations
        run: bun run db:generate
      - name: Rebuild native modules
        run: bun run prepare:native
      - name: Package Linux
        run: bun run build:linux
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            dist/*.deb
            dist/*.AppImage
            dist/latest-linux.yml
          if-no-files-found: warn

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install dependencies
        run: bun install --frozen-lockfile
        timeout-minutes: 10
      - name: Generate DB migrations
        run: bun run db:generate
      - name: Rebuild native modules
        run: bun run prepare:native
      - name: Package macOS
        run: bun run build:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-artifacts
          path: |
            dist/*.dmg
            dist/latest-mac.yml
          if-no-files-found: warn

  release:
    needs: [build-windows, build-linux, build-mac]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full git history for changelog generation
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: List artifacts
        run: ls -la artifacts/
      - name: Install git-cliff
        run: cargo install git-cliff
      - name: Generate Changelog
        run: git-cliff --config cliff.toml --latest --strip header --tag "${{ github.ref_name }}" -o RELEASE_NOTES.md
      - name: Read Release Notes
        id: release-notes
        run: |
          echo "content<<EOF" >> $GITHUB_OUTPUT
          cat RELEASE_NOTES.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - name: Create GitHub Release
        run: |
          gh release create "${{ github.ref_name }}" \
            artifacts/* \
            --title "${{ github.ref_name }}" \
            --notes-file RELEASE_NOTES.md \
            --draft \
            --prerelease=${{ contains(github.ref, '-beta') || contains(github.ref, '-alpha') || contains(github.ref, '-rc') }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Update CHANGELOG.md
        run: git-cliff --config cliff.toml --tag "${{ github.ref_name }}" -o CHANGELOG.md
      - name: Commit CHANGELOG.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "chore(release): update CHANGELOG.md for ${{ github.ref_name }}" || echo "No changes to commit"
          git push origin HEAD || echo "Nothing to push"
