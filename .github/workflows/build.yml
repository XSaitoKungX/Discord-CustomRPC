name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install dependencies
        run: bun install --frozen-lockfile
        timeout-minutes: 10
      - name: Generate DB migrations
        run: bun run db:generate
      - name: Rebuild native modules
        run: bun run prepare:native
      - name: Build & Publish Windows
        run: bun run release:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install system deps
        run: sudo apt-get install -y rpm fakeroot
      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          ELECTRON_GET_USE_PROXY: false
        timeout-minutes: 10
      - name: Generate DB migrations
        run: bun run db:generate
      - name: Rebuild native modules
        run: bun run prepare:native
      - name: Build & Publish Linux
        run: bun run release:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install dependencies
        run: bun install --frozen-lockfile
        timeout-minutes: 10
      - name: Generate DB migrations
        run: bun run db:generate
      - name: Rebuild native modules
        run: bun run prepare:native
      - name: Build & Publish macOS
        run: bun run release:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

  changelog:
    needs: [build-windows, build-linux, build-mac]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install git-cliff
        run: cargo install git-cliff
        timeout-minutes: 10
      - name: Generate release notes
        run: git-cliff --config cliff.toml --latest --strip header --tag "${{ github.ref_name }}" -o RELEASE_NOTES.md
      - name: Update release with changelog
        run: |
          gh release edit "${{ github.ref_name }}" \
            --notes-file RELEASE_NOTES.md \
            --prerelease=${{ contains(github.ref, '-beta') || contains(github.ref, '-alpha') || contains(github.ref, '-rc') }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Update CHANGELOG.md
        run: git-cliff --config cliff.toml --tag "${{ github.ref_name }}" -o CHANGELOG.md
      - name: Commit CHANGELOG.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "chore(release): update CHANGELOG.md for ${{ github.ref_name }}" || echo "No changes to commit"
          git push origin HEAD || echo "Nothing to push"
