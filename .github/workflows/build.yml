name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: windows-node_modules-${{ hashFiles('bun.lock') }}
          restore-keys: windows-node_modules-

      - name: Cache Electron
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\electron\Cache
          key: windows-electron-${{ hashFiles('package.json') }}
          restore-keys: windows-electron-

      - name: Cache electron-builder
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\electron-builder\Cache
          key: windows-electron-builder-${{ hashFiles('package.json') }}
          restore-keys: windows-electron-builder-

      - name: Install dependencies
        run: bun install --frozen-lockfile
        timeout-minutes: 10

      - name: Generate DB migrations
        run: bun run db:generate

      - name: Build app
        run: bun run build

      - name: Rebuild native modules
        run: bun run prepare:native

      - name: Package Windows
        run: electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            dist/*.exe
            dist/*.blockmap
            dist/latest.yml
          if-no-files-found: warn

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: linux-node_modules-${{ hashFiles('bun.lock') }}
          restore-keys: linux-node_modules-

      - name: Cache Electron
        uses: actions/cache@v4
        with:
          path: ~/.cache/electron
          key: linux-electron-${{ hashFiles('package.json') }}
          restore-keys: linux-electron-

      - name: Cache electron-builder
        uses: actions/cache@v4
        with:
          path: ~/.cache/electron-builder
          key: linux-electron-builder-${{ hashFiles('package.json') }}
          restore-keys: linux-electron-builder-

      - name: Install system deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y rpm fakeroot dpkg libarchive-tools

      - name: Install dependencies
        run: bun install --frozen-lockfile
        timeout-minutes: 10

      - name: Generate DB migrations
        run: bun run db:generate

      - name: Build app
        run: bun run build

      - name: Rebuild native modules
        run: bun run prepare:native

      - name: Package Linux
        run: electron-builder --linux deb AppImage rpm --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            dist/*.deb
            dist/*.AppImage
            dist/*.rpm
            dist/*.blockmap
            dist/latest-linux.yml
          if-no-files-found: warn

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: macos-node_modules-${{ hashFiles('bun.lock') }}
          restore-keys: macos-node_modules-

      - name: Cache Electron
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/electron
          key: macos-electron-${{ hashFiles('package.json') }}
          restore-keys: macos-electron-

      - name: Cache electron-builder
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/electron-builder
          key: macos-electron-builder-${{ hashFiles('package.json') }}
          restore-keys: macos-electron-builder-

      - name: Install dependencies
        run: bun install --frozen-lockfile
        timeout-minutes: 10

      - name: Generate DB migrations
        run: bun run db:generate

      - name: Build app
        run: bun run build

      - name: Rebuild native modules
        run: bun run prepare:native

      - name: Package macOS
        run: electron-builder --mac --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-artifacts
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.blockmap
            dist/latest-mac.yml
          if-no-files-found: warn

  release:
    needs: [build-windows, build-linux, build-mac]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Install git-cliff
        uses: kenji-miyake/setup-git-cliff@v2

      - name: Generate release notes
        run: git-cliff --config cliff.toml --latest --strip header --tag "${{ github.ref_name }}" -o RELEASE_NOTES.md

      - name: Create GitHub Release
        run: |
          gh release create "${{ github.ref_name }}" \
            artifacts/* \
            --title "Release ${{ github.ref_name }}" \
            --notes-file RELEASE_NOTES.md \
            --draft \
            --prerelease=${{ contains(github.ref, '-beta') || contains(github.ref, '-alpha') || contains(github.ref, '-rc') }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update CHANGELOG.md
        run: git-cliff --config cliff.toml --tag "${{ github.ref_name }}" -o CHANGELOG.md

      - name: Commit CHANGELOG.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin
          git checkout main 2>/dev/null || git checkout master 2>/dev/null || true
          git add CHANGELOG.md
          git diff --cached --quiet || git commit -m "chore(release): update CHANGELOG.md for ${{ github.ref_name }}"
          git push origin HEAD || echo "Nothing to push"
