# git-cliff configuration file
# https://git-cliff.org/docs/configuration/

[changelog]
# template for the changelog header
header = """
# Changelog

All notable changes to this project will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

## [Unreleased]

"""
# template for the changelog body
body = """
{% if version %}## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}{% else %}## [Unreleased]{% endif %}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}
- {{ commit.message | upper_first }} {% if commit.scope %}({{ commit.scope }}){% endif %}
{% endfor %}
{% endfor %}

"""
# template for the changelog footer
footer = """
<!-- generated by git-cliff -->
"""
# remove the leading and trailing whitespace from the templates
trim = true

[git]
# parse the commits based on https://www.conventionalcommits.org
conventional_commits = true
# filter out the commits that are not conventional commits
filter_unconventional = false
# process each line of a commit message separately
split_commits = false
# regex for parsing and grouping commits
commit_parsers = [
  { message = "^feat", group = "<b>Features</b>" },
  { message = "^fix", group = "<b>Bug Fixes</b>" },
  { message = "^doc", group = "<b>Documentation</b>" },
  { message = "^perf", group = "<b>Performance</b>" },
  { message = "^refactor", group = "<b>Refactoring</b>" },
  { message = "^style", group = "<b>Styling</b>" },
  { message = "^test", group = "<b>Testing</b>" },
  { message = "^chore\\(release\\): prepare for", skip = true },
  { message = "^chore\\(deps\\)", skip = true },
  { message = "^chore", group = "<b>Miscellaneous Tasks</b>" },
  { message = "^build", group = "<b>Build System</b>" },
  { message = "^ci", group = "<b>CI/CD</b>" },
  { message = "^revert", group = "<b>Revert</b>" },
]
# protect breaking changes from being skipped due to matching a skipping commit_parser
protect_breaking_commits = false
# filter out the commits that are not matched by commit parsers
filter_commits = false
# regex for matching git tags
tag_pattern = "v[0-9].*"
# regex for skipping tags
skip_tags = "v0.0.0"
# regex for ignoring tags
ignore_tags = ""
# sort the tags topologically
topo_order = false
# sort the commits inside sections by oldest/newest order
sort_commits = "oldest"
